# This SealedSecret is generated by kubeseal and committed to git safely.
# The plaintext token is stored locally at ~/.config/whatsapp-bridge/token (chmod 600).
# NEVER commit the plaintext token.
#
# To regenerate:
#   TOKEN=$(openssl rand -base64 32)
#   mkdir -p ~/.config/whatsapp-bridge && echo "$TOKEN" > ~/.config/whatsapp-bridge/token && chmod 600 ~/.config/whatsapp-bridge/token
#   kubectl create secret generic whatsapp-bridge-secrets \
#     --namespace whatsapp \
#     --from-literal=mcp-bearer-token="$TOKEN" \
#     --dry-run=client -o yaml \
#   | kubeseal --scope namespace-wide --namespace whatsapp -o yaml > charts/whatsapp-bridge/templates/sealed-secret.yaml
#
# After apply, verify: kubectl get secret whatsapp-bridge-secrets -n whatsapp
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: whatsapp-bridge-secrets
  namespace: whatsapp
  annotations:
    sealedsecrets.bitnami.com/namespace-wide: "true"
spec:
  encryptedData:
    # Placeholder — replace with the output of kubeseal before committing.
    # See the comment at the top of this file for instructions.
    mcp-bearer-token: REPLACE_WITH_KUBESEAL_OUTPUT
  template:
    metadata:
      name: whatsapp-bridge-secrets
      namespace: whatsapp
    type: Opaque
